name: ci

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --group dev --all-packages --frozen
      - run: uv run ruff check .
      - run: uv run mypy apps/api/src agents/src
      - run: uv run pytest apps/api/tests agents/tests -v

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web typecheck
      - run: pnpm --filter web test
      - run: pnpm --filter web build

  e2e:
    runs-on: ubuntu-latest
    needs: [python, web]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: uv sync --group dev --all-packages --frozen
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec playwright install --with-deps chromium
      - run: pnpm --filter web e2e

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ai-harness:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  env-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: astral-sh/setup-uv@v3
      - name: Check Python / Node / dep parity
        run: |
          python -c "
          import tomllib
          from pathlib import Path

          root = tomllib.loads(Path('pyproject.toml').read_text())
          api = tomllib.loads(Path('apps/api/pyproject.toml').read_text())
          agents = tomllib.loads(Path('agents/pyproject.toml').read_text())

          py_versions = {
              'root': root['project'].get('requires-python'),
              'api': api['project'].get('requires-python'),
              'agents': agents['project'].get('requires-python'),
          }
          unique_py = set(v for v in py_versions.values() if v is not None)
          if len(unique_py) > 1:
              raise SystemExit(f'Python version mismatch: {py_versions}')
          print(f'Python parity OK: {py_versions}')

          nvmrc = Path('.nvmrc').read_text().strip()
          if nvmrc not in ('22', 'v22'):
              raise SystemExit(f'.nvmrc says {nvmrc!r}, CI uses node 22')
          print(f'Node parity OK: .nvmrc={nvmrc!r}')
          "
