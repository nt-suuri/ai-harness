name: deploy-prod

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/product/**'
      - 'docs/superpowers/**'
      - 'RELEASES.md'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  models: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Check kill-switch
        env:
          PAUSE: ${{ vars.PAUSE_AGENTS }}
        run: |
          if [ "${PAUSE}" = "true" ]; then
            echo "PAUSE_AGENTS=true — skipping deploy-prod"
            exit 0
          fi
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --group dev --all-packages --frozen
      - name: Assess deployment risk
        env:
          HARNESS_BACKEND: ${{ vars.HARNESS_BACKEND }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_TOKEN: ${{ secrets.COPILOT_PAT }}
          GITHUB_MODELS_DEFAULT_MODEL: ${{ vars.COPILOT_MODEL_DEPLOYER || 'openai/gpt-4.1-mini' }}
          GH_REPO: ${{ github.repository }}
        run: uv run python -m agents.deploy_gate --sha ${{ github.sha }}
      - name: Install Railway CLI
        run: npm i -g @railway/cli@latest
      - name: Deploy to prod
        run: railway up --service ${{ vars.RAILWAY_SERVICE || 'ai-harness' }} --detach
