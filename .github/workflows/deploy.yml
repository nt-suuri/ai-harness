name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Check kill-switch
        env:
          PAUSE: ${{ vars.PAUSE_AGENTS }}
        run: |
          if [ "${PAUSE}" = "true" ]; then
            echo "PAUSE_AGENTS=true — skipping deploy"
            exit 0
          fi
      - uses: actions/checkout@v4
      - name: Debug connectivity
        run: |
          echo "Testing Railway API connectivity..."
          curl -sS -m 10 -X POST https://backboard.railway.com/graphql/v2 \
            -H "Content-Type: application/json" \
            -H "project-access-token: $RAILWAY_TOKEN" \
            -d '{"query":"query ProjectToken { projectToken { id project { id name } environment { id name } } }"}' 2>&1 | head -100
          echo "Exit code: $?"
      - name: Deploy
        run: railway up --service ${{ vars.RAILWAY_SERVICE || 'ai-harness' }} --detach
