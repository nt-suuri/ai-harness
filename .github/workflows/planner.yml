name: planner

on:
  issues:
    types: [opened, labeled, reopened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to plan"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read

jobs:
  plan:
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'agent:build')
      || (github.event_name == 'issues' && github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'agent:build'))
      || (github.event_name == 'issues' && github.event.action == 'reopened' && contains(github.event.issue.labels.*.name, 'agent:build'))
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HARNESS_BACKEND: ${{ vars.HARNESS_BACKEND }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_MODELS_TOKEN: ${{ secrets.COPILOT_PAT }}
      GITHUB_MODELS_DEFAULT_MODEL: ${{ vars.COPILOT_MODEL_PLANNER || 'openai/gpt-4o-mini' }}
      GH_REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
    steps:
      - name: Check kill-switch
        env:
          PAUSE: ${{ vars.PAUSE_AGENTS }}
        run: |
          if [ "${PAUSE}" = "true" ]; then
            echo "PAUSE_AGENTS=true — skipping planner"
            exit 0
          fi
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Configure git push auth
        run: |
          git config --global user.name "ai-harness-bot"
          git config --global user.email "ai-harness@local"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPO}.git"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --group dev --all-packages --frozen
      - name: Plan and open PR
        env:
          # gh pr merge inside the planner needs a user-scoped token so the
          # resulting squash-merge push triggers downstream workflows
          # (deploy-prod, release-notes, etc). The default GITHUB_TOKEN would
          # be attributed to github-actions[bot] and hit cascade protection.
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: uv run python -m agents.planner --issue "$ISSUE_NUMBER"
